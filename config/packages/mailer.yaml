framework:
    mailer:
        dsn: 'smtp://%env(urlencode:BREVO_SMTP_USER)%:%env(urlencode:BREVO_SMTP_KEY)%@smtp-relay.brevo.com:587'

when@prod:
    framework:
        mailer:
            # null://null when unset so the app boots without mail; entrypoint sets MAILER_DSN from BREVO_API_KEY
            dsn: '%env(default:default_mailer_dsn:MAILER_DSN)%'

when@test:
    framework:
        mailer:
            dsn: 'null://null'
