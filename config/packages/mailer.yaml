framework:
    mailer:
        dsn: 'smtp://%env(urlencode:BREVO_SMTP_USER)%:%env(urlencode:BREVO_SMTP_KEY)%@smtp-relay.brevo.com:587'

when@prod:
    framework:
        mailer:
            dsn: 'brevo+api://%env(BREVO_API_KEY)%@default'

when@test:
    framework:
        mailer:
            dsn: 'null://null'
