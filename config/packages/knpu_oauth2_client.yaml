knpu_oauth2_client:
    clients:
        google_main:
            type: google
            client_id: '%env(GOOGLE_OAUTH_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_OAUTH_CLIENT_SECRET)%'
            redirect_route: app_connect_google_check
            redirect_params: {}
        google_mobile:
            type: google
            client_id: '%env(GOOGLE_OAUTH_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_OAUTH_CLIENT_SECRET)%'
            # Full URL (not a route name) — must match Google Cloud Console exactly.
            redirect_route: '%env(GOOGLE_MOBILE_REDIRECT_URI)%'
            redirect_params: {}
            use_state: false
